name: deploy-schema

on:
  push:
    branches:
      - main
    paths:
      - schemas/**
      - .github/workflows/deploy-schema.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configure-pages
        uses: actions/configure-pages@v5

      - name: stage schema artifact
        run: |
          mkdir -p .pages/schemas
          test -f schemas/telemetry.schema.json
          cp schemas/telemetry.schema.json .pages/schemas/telemetry.schema.json

      - name: upload-pages-artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: deploy-pages
        id: deployment
        uses: actions/deploy-pages@v4
