name: deploy-pages

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig.base.json
      - packages/opencode-cc-otel-web/**
      - schemas/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: configure-pages
        uses: actions/configure-pages@v5

      - name: install deps
        run: bun install --frozen-lockfile

      - name: build spa
        env:
          PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/
        run: bun run build:site

      - name: stage pages artifact
        run: |
          mkdir -p .pages
          cp -R packages/opencode-cc-otel-web/dist/. .pages/
          touch .pages/.nojekyll
          mkdir -p .pages/schemas
          test -f schemas/telemetry.schema.json
          cp schemas/telemetry.schema.json .pages/schemas/telemetry.schema.json

      - name: upload-pages-artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: deploy-pages
        id: deployment
        uses: actions/deploy-pages@v4
